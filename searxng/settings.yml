# InterviewLens SearXNG config.
# Key deviations from defaults (both REQUIRED for the app to work):
#   1. search.formats includes "json" — the backend consumes the JSON API,
#      which is disabled by default (every request would 403 without this).
#   2. server.limiter is off — the backend is the only client, on localhost.
use_default_settings: true

server:
  secret_key: "da685df39a5c2ca591020e15355535a06686adad81c2932b52458e2507ad7a5e"
  limiter: false
  public_instance: false
  image_proxy: false

search:
  formats:
    - html
    - json
  # Default suspension times are hours long; one burst of queries would
  # otherwise blank out research runs for the rest of the day.
  suspended_times:
    SearxEngineTooManyRequests: 60
    SearxEngineCaptcha: 300
    SearxEngineAccessDenied: 60

# Enable extra general engines for redundancy — with only the defaults, a few
# CAPTCHA/rate-limit suspensions can zero out every search.
engines:
  - name: bing
    disabled: false
  - name: mojeek
    disabled: false
  - name: qwant
    disabled: false

valkey:
  url: valkey://redis:6379/0
